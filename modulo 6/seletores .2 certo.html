<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Curtidas</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        input {
            padding: 8px;
        }

        button {
            padding: 8px;
            cursor: pointer;
        }

        p {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Sistema de Curtidas</h1>

    <input type="text" id="nome" placeholder="Digite seu nome">
    <button onclick="curtir()">Curtir</button>

    <p id="resultado">Ninguém curtiu</p>

    <script>
        let curtidas = [];

        function curtir() {
            const input = document.getElementById("nome");
            const nome = input.value.trim();

            if (nome === "") {
                alert("Digite um nome!");
                return;
            }

            // Evita nomes duplicados (mesmo com maiúsculas/minúsculas)
            const existe = curtidas.some(n => n.toLowerCase() === nome.toLowerCase());

            if (!existe) {
                curtidas.push(nome);
            }

            input.value = "";
            atualizarTexto();
        }

        function atualizarTexto() {
            const p = document.getElementById("resultado");
            const total = curtidas.length;

            if (total === 0) {
                p.textContent = "Ninguém curtiu";
            } else if (total === 1) {
                p.textContent = curtidas[0] + " curtiu";
            } else if (total === 2) {
                p.textContent = curtidas[0] + " e " + curtidas[1] + " curtiram";
            } else {
                p.textContent = curtidas[0] + ", " + curtidas[1] + " e mais " + (total - 2) + " pessoas curtiram";
            }
        }
    </script>

</body>
</html>
