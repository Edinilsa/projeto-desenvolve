<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temporizador</title>
</head>
<body>

    <h1>Contagem Regressiva</h1>
    <p id="temporizador"></p>

    <script>
        // Definindo a data futura
        let dataFutura = new Date("2026-12-31T23:59:59");

        // 1. Função para calcular o tempo restante
        function calcularTempoRestante(dataFutura) {
            let agora = new Date();
            let diferenca = dataFutura - agora;

            if (diferenca <= 0) {
                return { dias: 0, horas: 0, minutos: 0, segundos: 0 };
            }

            let dias = Math.floor(diferenca / (1000 * 60 * 60 * 24));
            let horas = Math.floor((diferenca / (1000 * 60 * 60)) % 24);
            let minutos = Math.floor((diferenca / (1000 * 60)) % 60);
            let segundos = Math.floor((diferenca / 1000) % 60);

            return { dias, horas, minutos, segundos };
        }

        // 2. Função para atualizar o temporizador
        function atualizarTemporizador() {
            let tempo = calcularTempoRestante(dataFutura);

            document.getElementById("temporizador").innerText =
                tempo.dias + " dias, " +
                tempo.horas + " horas, " +
                tempo.minutos + " minutos, " +
                tempo.segundos + " segundos";
        }

        // 3. Atualizar a cada segundo
        setInterval(atualizarTemporizador, 1000);
    </script>

</body>
</html>
