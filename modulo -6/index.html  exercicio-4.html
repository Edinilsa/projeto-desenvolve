<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade: Tarefas e Curtidas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Seção 1: Lista de Tarefas -->
    <section class="container">
        <h2> Lista de Tarefas</h2>
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Descrição da tarefa...">
            <button id="addTaskBtn">Adicionar</button>
        </div>
        <div id="taskList"></div>
    </section>

    <hr>

    <!-- Seção 2: Sistema de Curtidas -->
    <section class="container">
        <h2> Sistema de Curtidas</h2>
        <div class="input-group">
            <input type="text" id="likeInput" placeholder="Digite seu nome">
            <button id="likeBtn">Curtir</button>
        </div>
        <p id="likeStatus">Ninguém curtiu</p>
    </section>

    <script src="script.js"></script>
</body>
</html>
