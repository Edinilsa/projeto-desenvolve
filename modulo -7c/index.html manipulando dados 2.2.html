<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feed Social</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- FORMULÁRIO -->
    <header class="topo">

        <form id="formPost">

            <textarea
                id="textoPost"
                placeholder="O que está acontecendo?"
                required
            ></textarea>

            <button type="submit">
                Postar
            </button>

        </form>

    </header>

    <!-- FEED -->
    <main>

        <div id="feed"></div>

    </main>

    <script src="script.js"></script>

</body>
</html>
