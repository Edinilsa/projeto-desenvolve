   }

        .post {
            background: white;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            border-left: 6px solid #2e7d32;
        }

        .avatar {
            width: 40px;
            border-radius: 50%;
        }

        img {
            max-width: 100%;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <!-- FORMULÁRIO -->
    <form id="formPost">
        <textarea id="texto" placeholder="Compartilhe uma dica sustentável 🌱"></textarea>
        <button type="submit">Postar</button>
    </form>

    <!-- FEED -->
    <div id="feed"></div>

    <script>
        let posts = [];

        // IMAGENS DE NATUREZA
        function buscarImagem() {
            const imagens = [
                "https://source.unsplash.com/400x300/?nature",
                "https://source.unsplash.com/400x300/?forest",
                "https://source.unsplash.com/400x300/?recycle",
                "https://source.unsplash.com/400x300/?water",
                "https://source.unsplash.com/400x300/?environment"
            ];
            return imagens[Math.floor(Math.random() * imagens.length)];
        }

        // RENDERIZAR POSTS
        function renderizarFeed() {
            const feed = document.getElementById("feed");
            feed.innerHTML = "";

            posts
            .sort((a, b) => b.data - a.data)
            .forEach((post, index) => {

                const div = document.createElement("div");
                div.className = "post";

                div.innerHTML = `
                    <img src="${post.avatar}" class="avatar">
                    <strong>${post.usuario}</strong>
                    <p>${post.texto}</p>
                    <img src="${post.imagem}">
                    <br><br>
                    <button onclick="curtir(${index})">🌱 Apoiar (${post.likes})</button>
                `;

                feed.appendChild(div);
            });
        }

        // CURTIR
        function curtir(index) {
            posts[index].likes++;
            renderizarFeed();
        }

        // POSTAR
        document.getElementById("formPost").addEventListener("submit", function(e) {
            e.preventDefault();

            const texto = document.getElementById("texto").value;

            if (texto.trim() === "") return;

            const novoPost = {
                data: new Date(),
                usuario: "EcoUser 🌱",
                avatar: "https://cdn-icons-png.flaticon.com/512/2909/2909768.png",
                texto: texto,
                imagem: buscarImagem(),
                likes: 0
            };

            posts.push(novoPost);

            document.getElementById("texto").value = "";

            renderizarFeed();
        });
    </script>

</body>
</html>
